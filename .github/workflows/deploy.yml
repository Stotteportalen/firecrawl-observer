name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  check:
    name: Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: npm run lint

  deploy:
    name: Deploy to production
    needs: check
    runs-on: ubuntu-latest
    environment: production
    env:
      REGISTRY: crstotteportalen
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set deployment variables
        id: vars
        shell: bash
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "image_tag=prod-${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Build image in ACR
        run: |
          az acr build \
            --registry ${{ env.REGISTRY }} \
            --image firecrawl-observer:${{ steps.vars.outputs.image_tag }} \
            --image firecrawl-observer:prod-latest \
            --build-arg NEXT_PUBLIC_APP_URL=https://firecrawl-observer.azurewebsites.net \
            --file Dockerfile \
            .

      - name: Deploy to Azure Web App
        run: |
          az webapp config container set \
            --name firecrawl-observer \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --container-image-name ${{ env.REGISTRY }}.azurecr.io/firecrawl-observer:${{ steps.vars.outputs.image_tag }}

      - name: Restart Web App
        run: |
          az webapp restart \
            --name firecrawl-observer \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }}

      - name: Azure Logout
        if: always()
        run: az logout
